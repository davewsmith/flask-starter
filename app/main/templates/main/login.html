{% extends "base.html" %}

{% block content %}

<h1>Sign In</h1>

<form method="post" action="">
    {{ form.hidden_tag() }}
    <p>
        {{ form.email.label }}: {{ form.email }}
    </p>
    <p>
        {{ form.password.label }}: {{ form.password }}
    </p>
    <p>{{ form.submit }}</p>
</form>

{% endblock %}
